<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600">

  <!-- background -->
  <rect x="0" y="0" width="1600" height="600" fill="#f4f4f4"/>

  <!-- browser window -->
  <rect x="250" y="80" width="1100" height="440" rx="12" fill="#ffffff" stroke="#dddddd"/>

  <!-- browser bar -->
  <rect x="250" y="80" width="1100" height="60" rx="12" fill="#efefef"/>

  <!-- browser buttons -->
  <circle cx="300" cy="110" r="7" fill="#ff6b6b"/>
  <circle cx="325" cy="110" r="7" fill="#ffd93d"/>
  <circle cx="350" cy="110" r="7" fill="#6bcf63"/>

  <!-- header -->
  <rect x="300" y="170" width="1000" height="60" rx="6" fill="#e6e6e6"/>

  <!-- content container (900px 느낌 표현) -->
  <rect x="450" y="260" width="700" height="240" rx="8" fill="#fafafa" stroke="#dcdcdc"/>

  <!-- text lines -->
  <rect x="500" y="300" width="600" height="14" rx="4" fill="#d0d0d0"/>
  <rect x="500" y="330" width="520" height="14" rx="4" fill="#d0d0d0"/>
  <rect x="500" y="360" width="560" height="14" rx="4" fill="#d0d0d0"/>

  <!-- image block -->
  <rect x="500" y="400" width="600" height="80" rx="6" fill="#e2e2e2"/>

  <!-- footer -->
  <rect x="300" y="520" width="1000" height="30" rx="6" fill="#ececec"/>

</svg>