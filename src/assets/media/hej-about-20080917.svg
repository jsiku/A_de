<svg width="100%" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">

<style>
text{
font-family: system-ui, sans-serif;
fill:#444;
font-size:14px;
}
.node{
fill:#fafafa;
stroke:#888;
stroke-width:1.5;
}
.center{
fill:#f5f5f5;
stroke:#555;
stroke-width:2;
}
.line{
stroke:#aaa;
stroke-width:2;
}
</style>

<!-- center -->
<circle cx="450" cy="250" r="60" class="center"/>
<text x="450" y="255" text-anchor="middle">siku</text>

<!-- nodes -->
<circle cx="200" cy="120" r="35" class="node"/>
<text x="200" y="125" text-anchor="middle">blog</text>

<circle cx="700" cy="120" r="35" class="node"/>
<text x="700" y="125" text-anchor="middle">wiki</text>

<circle cx="200" cy="380" r="35" class="node"/>
<text x="200" y="385" text-anchor="middle">micro</text>

<circle cx="700" cy="380" r="35" class="node"/>
<text x="700" y="385" text-anchor="middle">notes</text>

<!-- connections -->
<line x1="235" y1="145" x2="405" y2="225" class="line"/>
<line x1="665" y1="145" x2="495" y2="225" class="line"/>
<line x1="235" y1="355" x2="405" y2="275" class="line"/>
<line x1="665" y1="355" x2="495" y2="275" class="line"/>

</svg>