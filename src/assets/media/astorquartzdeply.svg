<svg width="100%" height="600" viewBox="0 0 1000 600"
xmlns="http://www.w3.org/2000/svg">

<defs>
<marker id="arrow"
markerWidth="10"
markerHeight="7"
refX="10"
refY="3.5"
orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
</marker>
</defs>

<!-- Logseq -->
<rect x="50" y="50" width="100" height="50" fill="#B0BEC5" opacity="0.4" rx="5"/>
<text x="100" y="70" text-anchor="middle" fill="#424242" font-size="14">Logseq</text>
<text x="100" y="88" text-anchor="middle" fill="#424242" font-size="10">(Replaced)</text>

<!-- Obsidian Vault -->
<circle cx="250" cy="300" r="80" fill="#4CAF50" stroke="#388E3C" stroke-width="3"/>
<text x="250" y="290" text-anchor="middle" fill="white" font-size="16">Obsidian</text>
<text x="250" y="310" text-anchor="middle" fill="white" font-size="14">Vault</text>

<!-- Decap -->
<rect x="50" y="450" width="120" height="60" fill="#90CAF9" stroke="#2196F3" stroke-width="2" rx="5"/>
<text x="110" y="485" text-anchor="middle" fill="#333" font-size="14">Decap CMS</text>

<!-- Private Repo -->
<rect x="380" y="260" width="120" height="80" fill="#607D8B" stroke="#455A64" stroke-width="3" rx="10"/>
<text x="440" y="295" text-anchor="middle" fill="white" font-size="14">Private Repo</text>
<text x="440" y="315" text-anchor="middle" fill="white" font-size="12">(Vault)</text>

<!-- GitHub Actions -->
<rect x="580" y="270" width="90" height="60" fill="#FFC107" stroke="#FFA000" stroke-width="2" rx="5"/>
<text x="625" y="300" text-anchor="middle" fill="white" font-size="14">Actions</text>

<!-- Quartz Repo -->
<rect x="750" y="150" width="120" height="60" fill="#607D8B" stroke="#455A64" stroke-width="2" rx="5"/>
<text x="810" y="185" text-anchor="middle" fill="white" font-size="14">Quartz Repo</text>

<!-- Astro Repo -->
<rect x="750" y="390" width="120" height="60" fill="#607D8B" stroke="#455A64" stroke-width="2" rx="5"/>
<text x="810" y="425" text-anchor="middle" fill="white" font-size="14">Astro Repo</text>

<!-- Quartz Site -->
<rect x="900" y="160" width="80" height="40" fill="#FF5722" stroke="#D32F2F" stroke-width="2" rx="5"/>
<text x="940" y="185" text-anchor="middle" fill="white" font-size="12">Quartz</text>

<!-- Astro Site -->
<rect x="900" y="400" width="80" height="40" fill="#FF5722" stroke="#D32F2F" stroke-width="2" rx="5"/>
<text x="940" y="425" text-anchor="middle" fill="white" font-size="12">Astro</text>

<!-- Lines -->

<line x1="170" y1="480" x2="200" y2="320"
stroke="#2196F3"
stroke-width="2"
marker-end="url(#arrow)"/>

<line x1="330" y1="300" x2="380" y2="300"
stroke="#388E3C"
stroke-width="3"
marker-end="url(#arrow)"/>

<line x1="500" y1="300" x2="580" y2="300"
stroke="#FFC107"
stroke-width="2"
stroke-dasharray="4,2"
marker-end="url(#arrow)"/>

<line x1="620" y1="270" x2="800" y2="210"
stroke="#FFC107"
stroke-width="2"
stroke-dasharray="4,2"
marker-end="url(#arrow)"/>

<line x1="620" y1="330" x2="800" y2="390"
stroke="#FFC107"
stroke-width="2"
stroke-dasharray="4,2"
marker-end="url(#arrow)"/>

<line x1="870" y1="180" x2="900" y2="180"
stroke="#D32F2F"
stroke-width="3"
marker-end="url(#arrow)"/>

<line x1="870" y1="420" x2="900" y2="420"
stroke="#D32F2F"
stroke-width="3"
marker-end="url(#arrow)"/>

</svg>