<svg width="100%" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">

<style>
text{
font-family: system-ui, sans-serif;
fill:#444;
font-size:14px;
}
.line{
stroke:#aaa;
stroke-width:2;
}
.circle{
fill:#f5f5f5;
stroke:#888;
stroke-width:1.5;
}
</style>

<!-- timeline line -->
<line x1="120" y1="250" x2="780" y2="250" class="line"/>

<!-- nodes -->
<circle cx="200" cy="250" r="25" class="circle"/>
<circle cx="350" cy="250" r="25" class="circle"/>
<circle cx="500" cy="250" r="25" class="circle"/>
<circle cx="650" cy="250" r="25" class="circle"/>

<text x="200" y="295" text-anchor="middle">2006</text>
<text x="350" y="295" text-anchor="middle">2007</text>
<text x="500" y="295" text-anchor="middle">2008</text>
<text x="650" y="295" text-anchor="middle">Blog</text>

<text x="450" y="120" text-anchor="middle" font-size="28">
Personal Web History
</text>

</svg>