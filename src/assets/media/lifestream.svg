<svg xmlns="http://www.w3.org/2000/svg"
     width="1000"
     height="600"
     viewBox="0 0 1000 600">

  <defs>
    <marker id="arrow"
            markerWidth="10"
            markerHeight="7"
            refX="10"
            refY="3.5"
            orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- Write Capture -->
  <g>
    <rect x="60" y="220" width="180" height="140" rx="10" fill="#E3F2FD"/>
    <text x="150" y="245" text-anchor="middle" font-size="16" font-family="sans-serif" font-weight="bold">
      Write &amp; Capture
    </text>

    <rect x="90" y="270" width="120" height="30" rx="6" fill="#ffffff"/>
    <text x="150" y="290" text-anchor="middle" font-size="12" font-family="sans-serif">
      Delicious
    </text>

    <rect x="90" y="310" width="120" height="30" rx="6" fill="#ffffff"/>
    <text x="150" y="330" text-anchor="middle" font-size="12" font-family="sans-serif">
      Google Reader
    </text>
  </g>

  <!-- Aggregate -->
  <g>
    <rect x="420" y="220" width="160" height="120" rx="10" fill="#FFF3E0"/>
    <text x="500" y="245" text-anchor="middle" font-size="16" font-family="sans-serif" font-weight="bold">
      Aggregate
    </text>

    <rect x="450" y="270" width="100" height="35" rx="6" fill="#ffffff"/>
    <text x="500" y="292" text-anchor="middle" font-size="12" font-family="sans-serif">
      FriendFeed
    </text>
  </g>

  <!-- Share -->
  <g>
    <rect x="720" y="180" width="220" height="240" rx="10" fill="#E8F5E9"/>
    <text x="830" y="205" text-anchor="middle" font-size="16" font-family="sans-serif" font-weight="bold">
      Share &amp; Connect
    </text>

    <rect x="750" y="230" width="150" height="28" rx="6" fill="#ffffff"/>
    <text x="825" y="248" text-anchor="middle" font-size="12" font-family="sans-serif">
      Facebook
    </text>

    <rect x="750" y="265" width="150" height="28" rx="6" fill="#ffffff"/>
    <text x="825" y="283" text-anchor="middle" font-size="12" font-family="sans-serif">
      Twitter
    </text>

    <rect x="750" y="300" width="150" height="28" rx="6" fill="#ffffff"/>
    <text x="825" y="318" text-anchor="middle" font-size="12" font-family="sans-serif">
      Google Buzz
    </text>

    <rect x="750" y="335" width="150" height="28" rx="6" fill="#ffffff"/>
    <text x="825" y="353" text-anchor="middle" font-size="12" font-family="sans-serif">
      Flickr / Picasa
    </text>

    <rect x="750" y="370" width="150" height="28" rx="6" fill="#ffffff"/>
    <text x="825" y="388" text-anchor="middle" font-size="12" font-family="sans-serif">
      Youtube
    </text>

    <rect x="750" y="405" width="150" height="28" rx="6" fill="#ffffff"/>
    <text x="825" y="423" text-anchor="middle" font-size="12" font-family="sans-serif">
      Yahoo Meme
    </text>
  </g>

  <!-- arrows -->
  <line x1="240" y1="290" x2="420" y2="290"
        stroke="#333"
        stroke-width="2"
        marker-end="url(#arrow)"/>

  <line x1="580" y1="290" x2="720" y2="290"
        stroke="#333"
        stroke-width="2"
        marker-end="url(#arrow)"/>

  <!-- feedback -->
  <path d="M720 320 C650 420 350 420 300 320"
        fill="none"
        stroke="#999"
        stroke-width="2"
        marker-end="url(#arrow)"/>

  <path d="M300 340 C350 460 650 460 720 340"
        fill="none"
        stroke="#999"
        stroke-width="2"
        marker-end="url(#arrow)"/>

</svg>