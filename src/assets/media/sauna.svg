  <rect x='0' y='0' width='800' height='400' fill='url(#warmthGradient)' />

  <circle cx='350' cy='200' r='80' fill='rgba(255,255,255,0.4)' stroke='none' />
  <circle cx='450' cy='200' r='70' fill='rgba(255,255,255,0.4)' stroke='none' />

