<svg width='100%' viewBox='0 0 800 400' xmlns='http://www.w3.org/2000/svg'>
  <defs>
    <linearGradient id='warmthGradient' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' style='stop-color:rgb(255,210,150);stop-opacity:1' />
      <stop offset='100%' style='stop-color:rgb(255,120,50);stop-opacity:1' />
    </linearGradient>
    <filter id="steamBlur">
