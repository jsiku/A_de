  <path d='M500 250 Q550 200 600 250 T700 250' stroke='white' stroke-width='3' fill='none' opacity='0.6' filter='url(#steamBlur)' />
  <circle cx='400' cy='120' r='15' fill='rgba(255,255,255,0.7)' filter='url(#steamBlur)' />
  <circle cx='380' cy='280' r='12' fill='rgba(255,255,255,0.7)' filter='url(#steamBlur)' />
  <circle cx='550' cy='180' r='10' fill='rgba(255,255,255,0.7)' filter='url(#steamBlur)' />
</svg>