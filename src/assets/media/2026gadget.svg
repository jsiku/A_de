<svg width='100%' viewBox='0 0 800 400' fill='none' xmlns='http://www.w3.org/2000/svg'>
  <!-- Background for modernity and cleanliness -->
  <rect x='0' y='0' width='800' height='400' fill='#F0F2F5'/>

  <!-- Central "Personalized Homepage" - a hub of convenience -->
  <rect x='150' y='50' width='500' height='300' rx='20' ry='20' fill='#FFFFFF' stroke='#2196F3' stroke-width='3'/>

  <!-- "Widgets/Gadgets" - organized, always-ready tools -->
  <circle cx='250' cy='150' r='30' fill='#4CAF50'/>
  <rect x='350' y='120' width='80' height='60' rx='10' ry='10' fill='#FFC107'/>
  <polygon points='500,180 530,120 560,180' fill='#E91E63'/>

  <circle cx='250' cy='250' r='30' fill='#00BCD4'/>
  <rect x='350' y='220' width='80' height='60' rx='10' ry='10' fill='#795548'/>
  <polygon points='500,280 530,220 560,280' fill='#673AB7'/>

  <!-- "Tabbed Browsing" - consolidation of multiple windows -->
  <g transform='translate(100, -50)'>
    <rect x='600' y='100' width='120' height='80' rx='8' ry='8' fill='#BBDEFB' stroke='#2196F3' stroke-width='1' opacity='0.8'/>
    <rect x='610' y='110' width='120' height='80' rx='8' ry='8' fill='#90CAF9' stroke='#2196F3' stroke-width='1' opacity='0.9'/>
    <rect x='620' y='120' width='120' height='80' rx='8' ry='8' fill='#64B5F6' stroke='#2196F3' stroke-width='2'/>
  </g>

  <!-- "Inconvenience" (before personalization) - scattered, disconnected elements -->
  <g transform='translate(50, 50)'>
    <line x1='0' y1='0' x2='30' y2='0' stroke='#EF5350' stroke-width='1' stroke-dasharray='3 3' opacity='0.6'/>
    <line x1='10' y1='20' x2='40' y2='20' stroke='#EF5350' stroke-width='1' stroke-dasharray='3 3' opacity='0.6'/>
    <line x1='20' y1='40' x2='50' y2='40' stroke='#EF5350' stroke-width='1' stroke-dasharray='3 3' opacity='0.6'/>
    <rect x='0' y='50' width='15' height='15' fill='#EF9A9A' opacity='0.4'/>
    <rect x='20' y='65' width='15' height='15' fill='#EF9A9A' opacity='0.4'/>
  </g>

  <!-- "Efficiency/Direct Access" - smooth paths showing streamlined workflow -->
  <path d='M 100 200 C 120 180, 140 160, 170 150' stroke='#4CAF50' stroke-width='2' fill='none'/>
  <path d='M 100 200 C 120 220, 140 240, 170 250' stroke='#4CAF50' stroke-width='2' fill='none'/>
  <path d='M 650 150 C 680 160, 700 180, 720 200' stroke='#4CAF50' stroke-width='2' fill='none'/>
  <path d='M 650 250 C 680 240, 700 220, 720 200' stroke='#4CAF50' stroke-width='2' fill='none'/>

</svg>
