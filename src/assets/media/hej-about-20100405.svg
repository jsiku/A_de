<svg width="100%" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">

<style>
text{
font-family: system-ui, sans-serif;
fill:#444;
}
.line{
stroke:#bbb;
stroke-width:2;
}
.node{
fill:#fafafa;
stroke:#777;
stroke-width:1.5;
}
</style>

<!-- timeline -->
<line x1="150" y1="250" x2="750" y2="250" class="line"/>

<!-- nodes -->
<circle cx="250" cy="250" r="28" class="node"/>
<circle cx="450" cy="250" r="28" class="node"/>
<circle cx="650" cy="250" r="28" class="node"/>

<text x="250" y="300" text-anchor="middle">2008</text>
<text x="450" y="300" text-anchor="middle">2010</text>
<text x="650" y="300" text-anchor="middle">Now</text>

<text x="450" y="140" text-anchor="middle" font-size="28">
Archived Profile
</text>

</svg>