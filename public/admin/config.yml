backend:
  name: github
  repo: jsiku/A_de # 형님의 GitHub 저장소
  branch: main
  base_url: https://a-de.pages.dev # 클라우드플레어 배포 주소
  auth_endpoint: api/auth # 우리가 곧 만들 자체 인증 진입점

# 이미지 업로드 설정 (Astro의 src/assets/media에 맞춤)
media_folder: "../vault/publish/a_blog_content/assets/media"
public_folder: "../../assets/media"

collections:
  - name: "blog"
    label: "통합 블로그 콘텐츠"
    folder: "../vault/publish/a_blog_content/content/blog" # 마크다운 파일이 저장될 폴더
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}" # 파일명 규칙
    fields:
      # ✨ 핵심 수정: options에 tags와 hej를 추가하여 4가지 타입을 모두 선택할 수 있게 반영했습니다.
      - {
          label: "Type (글 종류)",
          name: "type",
          widget: "select",
          options: ["post", "memo", "tags", "hej"],
          default: "post",
        }
      - { label: "제목", name: "title", widget: "string", required: false }
      - { label: "작성일", name: "date", widget: "datetime" }
      - {
          label: "수정일",
          name: "updated",
          widget: "datetime",
          required: false,
        }
      - {
          label: "설명(Description)",
          name: "description",
          widget: "text",
          required: false,
        }
      - { label: "태그", name: "tags", widget: "list", required: false }
      - {
          label: "커버 이미지",
          name: "cover",
          widget: "image",
          required: false,
        }
      - {
          label: "URL 슬러그(slug)",
          name: "slug",
          widget: "string",
          required: false,
        }
      - {
          label: "이메일 인트로",
          name: "emailIntro",
          widget: "text",
          required: false,
        }
      - {
          label: "상단 고정(pinned)",
          name: "pinned",
          widget: "boolean",
          required: false,
          default: false,
        }
      - {
          label: "초안(draft)",
          name: "draft",
          widget: "boolean",
          required: false,
          default: false,
        }
      - { label: "본문 내용", name: "body", widget: "markdown" }
